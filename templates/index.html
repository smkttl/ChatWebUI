<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Web UI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            border-bottom: 1px solid #0f3460;
        }
        h1 {
            font-size: 1.5rem;
            color: #00d9ff;
        }
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
        }
        select {
            background: #0f3460;
            color: #fff;
            border: 1px solid #00d9ff;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 1rem;
            min-width: 200px;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 217, 255, 0.3);
        }
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding-bottom: 1rem;
        }
        .message {
            padding: 1rem;
            border-radius: 8px;
            max-width: 85%;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .message.user {
            background: #0f3460;
            align-self: flex-end;
            border: 1px solid #00d9ff;
        }
        .message.assistant {
            background: #16213e;
            align-self: flex-start;
            border: 1px solid #e94560;
        }
        .message.error {
            background: #3d1a1a;
            border: 1px solid #ff4444;
            color: #ff8888;
        }
        .message Thinking {
            color: #888;
            font-style: italic;
        }
        #input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: #16213e;
            border-radius: 8px;
            border: 1px solid #0f3460;
        }
        #message-input {
            flex: 1;
            background: #0f3460;
            color: #fff;
            border: 1px solid #333;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-size: 1rem;
            resize: none;
            min-height: 50px;
            font-family: inherit;
        }
        #message-input:focus {
            outline: none;
            border-color: #00d9ff;
        }
        #send-btn {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        #send-btn:hover {
            background: #00b8d9;
        }
        #send-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .thinking {
            color: #888;
            font-style: italic;
            padding: 0.5rem;
        }
        .streaming {
            color: #00d9ff;
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Chat Web UI</h1>
        <div class="controls">
            <div class="control-group">
                <label for="server-select">Server</label>
                <select id="server-select">
                    {% for server in servers %}
                    <option value="{{ server.name }}">{{ server.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="control-group">
                <label for="model-select">Model</label>
                <select id="model-select" disabled>
                    <option>Select a server first</option>
                </select>
            </div>
        </div>
    </header>
    
    <div id="chat-container">
        <div id="messages"></div>
        
        <div id="input-area">
            <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const serverSelect = document.getElementById('server-select');
        const modelSelect = document.getElementById('model-select');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');
        
        let messages = [];
        
        // Load models when server changes
        serverSelect.addEventListener('change', async () => {
            const server = serverSelect.value;
            modelSelect.innerHTML = '<option>Loading models...</option>';
            modelSelect.disabled = true;
            
            try {
                const response = await fetch(`/api/models?server=${encodeURIComponent(server)}`);
                const data = await response.json();
                
                if (data.error) {
                    modelSelect.innerHTML = `<option>Error: ${data.error}</option>`;
                    return;
                }
                
                modelSelect.innerHTML = data.models.map(m => 
                    `<option value="${m}">${m}</option>`
                ).join('');
                modelSelect.disabled = false;
            } catch (err) {
                modelSelect.innerHTML = `<option>Failed to load models</option>`;
            }
        });
        
        // Load models on page load if servers exist
        if (serverSelect.value) {
            serverSelect.dispatchEvent(new Event('change'));
        }
        
        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        });
        
        // Send message on button click or Enter (Shift+Enter for newline)
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;
            
            const server = serverSelect.value;
            const model = modelSelect.value;
            
            if (!model || modelSelect.disabled) {
                addMessage('error', 'Please select a model first');
                return;
            }
            
            // Add user message
            messages.push({ role: 'user', content });
            addMessage('user', content);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            // Add empty assistant message for streaming
            messages.push({ role: 'assistant', content: '' });
            const assistantMsg = addMessage('assistant', '');
            assistantMsg.classList.add('streaming');
            
            sendBtn.disabled = true;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        server,
                        model,
                        messages: messages.slice(0, -1), // Without the empty assistant message
                        stream: true
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    assistantMsg.textContent = `Error: ${error.error || 'Unknown error'}`;
                    assistantMsg.classList.remove('streaming');
                    assistantMsg.classList.add('error');
                    return;
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() && line.startsWith('data: '));
                    
                    for (const line of lines) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices?.[0]?.delta?.content || '';
                            fullContent += delta;
                            assistantMsg.textContent = fullContent;
                            messagesDiv.scrollTop = messagesDiv.scrollHeight;
                        } catch (e) {
                            // Skip malformed JSON
                        }
                    }
                }
                
                messages[messages.length - 1].content = fullContent;
                assistantMsg.classList.remove('streaming');
                
            } catch (err) {
                assistantMsg.textContent = `Error: ${err.message}`;
                assistantMsg.classList.remove('streaming');
                assistantMsg.classList.add('error');
            }
            
            sendBtn.disabled = false;
        }
        
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
